{{- if .Values.credentials.apiToken }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.credentials.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: f5xc-k8s-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  api-token: {{ .Values.credentials.apiToken | quote }}
{{- end }}
