---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - xc.f5.com
  resources:
  - appfirewalls
  - healthchecks
  - originpools
  - ratelimiters
  - servicepolicies
  - tcploadbalancers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - xc.f5.com
  resources:
  - appfirewalls/finalizers
  - healthchecks/finalizers
  - originpools/finalizers
  - ratelimiters/finalizers
  - servicepolicies/finalizers
  - tcploadbalancers/finalizers
  verbs:
  - update
- apiGroups:
  - xc.f5.com
  resources:
  - appfirewalls/status
  - healthchecks/status
  - originpools/status
  - ratelimiters/status
  - servicepolicies/status
