---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  - secrets
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - gateways
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - xc.f5.com
  resources:
  - apidefinitions
  - appfirewalls
  - certificates
  - healthchecks
  - httploadbalancers
  - malicioususermitigations
  - originpools
  - ratelimiters
  - servicepolicies
  - tcploadbalancers
  - useridentifications
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - xc.f5.com
  resources:
  - apidefinitions/finalizers
  - appfirewalls/finalizers
  - certificates/finalizers
  - healthchecks/finalizers
  - httploadbalancers/finalizers
  - malicioususermitigations/finalizers
  - originpools/finalizers
  - ratelimiters/finalizers
  - servicepolicies/finalizers
  - tcploadbalancers/finalizers
  - useridentifications/finalizers
  verbs:
  - update
- apiGroups:
  - xc.f5.com
  resources:
  - apidefinitions/status
  - appfirewalls/status
  - certificates/status
  - healthchecks/status
  - httploadbalancers/status
  - malicioususermitigations/status
  - originpools/status
  - ratelimiters/status
  - servicepolicies/status
  - tcploadbalancers/status
  - useridentifications/status
  verbs:
  - get
  - patch
  - update
