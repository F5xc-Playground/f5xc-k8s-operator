apiVersion: xc.f5.com/v1alpha1
kind: HTTPLoadBalancer
metadata:
  name: example-httplb
spec:
  xcNamespace: default
  domains:
    - "app.example.com"
  http:
    dns_volterra_managed: true
  defaultRoutePools:
    - pool:
        name: example-pool
      weight: 1
  advertiseOnPublicDefaultVIP: {}
